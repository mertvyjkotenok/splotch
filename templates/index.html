<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>SPLOTCH - Графический редактор</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='main.css') }}">
    <style>
        .room-flash-msg {
            background-color: #ff4d4d;
            color: white;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 10px;
            text-align: center;
            font-weight: bold;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="nav">
    <span><b>SPLOTCH</b> | {{ username }}</span>
    <div class="nav-status">Статус: <b id="statusValue" style="color: white;">В общем зале</b></div>
    <a href="{{ url_for('logout') }}" class="nav-link">Выход</a>
</div>

<div class="toolbar">
    <div class="tool-group">
        <button class="t-btn active" onclick="setTool('brush', this)" title="Кисть">🖌️</button>
        <button class="t-btn" onclick="setTool('line', this)" title="Линия">📏</button>
        <button class="t-btn" onclick="setTool('rect', this)" title="Прямоугольник">⬜</button>
        <button class="t-btn" onclick="setTool('ellipse', this)" title="Эллипс">⭕</button>
        <button class="t-btn" onclick="setTool('tri', this)" title="Треугольник">🔺</button>
        <button class="t-btn" onclick="setTool('fill', this)" title="Умная заливка">🎨</button>
        <button class="t-btn" onclick="setTool('eraser', this)" title="Ластик">🧽</button>
        </div>

    <div class="tool-group">
        <input type="color" id="colorPicker" value="#000000" style="width:30px; height:34px; border:none; background:none; cursor:pointer;">
        <input type="range" id="sizeSlider" min="1" max="50" value="4">
    </div>

    <div class="tool-group">
        <button class="t-btn" onclick="undoLastAction()" title="Отменить свое действие">↩️</button>
        <button class="t-btn" onclick="redoLastAction()" title="Вернуть отмененное действие">↪️</button>
        <button class="t-btn" onclick="showClearModal()" title="Очистить холст для всех">🗑️</button>
    </div>

    <div class="tool-group">
        <button class="t-btn" onclick="changeZoom(-0.1)">➖</button>
        <span id="zoomVal" style="min-width: 50px; text-align: center;">100%</span>
        <button class="t-btn" onclick="changeZoom(0.1)">➕</button>
    </div>

    <div class="tool-group">
        <button class="t-btn" onclick="document.getElementById('imgLoader').click()" title="Загрузить фото">📤</button>
        <button class="t-btn" onclick="saveImage()" title="Сохранить результат">📥</button>
        <input type="file" id="imgLoader" class="hidden" accept="image/*">
    </div>
</div>

<div class="main-layout">
    <div class="canvas-container">
        <div class="canvas-wrapper" id="zoomWrapper">
            <canvas id="mainCanvas" width="1200" height="800"></canvas>
            <canvas id="tempCanvas" width="1200" height="800"></canvas>
        </div>
    </div>

    <div class="side-panel">
        <div id="roomSelector">
            <button id="btnCreate" onclick="toggleForm('create')" class="room-btn btn-main">Создать комнату</button>
            <button id="btnJoin" onclick="toggleForm('join')" class="room-btn btn-main">Войти в комнату</button>
            
            <div id="roomForm" class="hidden">
                <div id="roomError" class="room-flash-msg hidden"></div>
                
                <input type="text" id="roomInput" placeholder="Имя комнаты" onkeypress="handleRoomEnter(event)">
                <input type="password" id="passInput" placeholder="Пароль" onkeypress="handleEnter(event, submitRoom)">
                <button onclick="submitRoom()" id="confirmBtn" class="room-btn">Подтвердить</button>
            </div>
        </div>

        <div id="activeRoomInfo" class="hidden">
            <button onclick="leaveToMain()" class="room-btn btn-leave">Выйти в общий зал</button>
        </div>

        <div class="chat-area">
            <div id="messages"></div>
            <input type="text" id="msgInput" placeholder="Сообщение..." onkeypress="handleEnter(event, sendMsg)">
        </div>
    </div>
</div>

<div id="clearModal" class="modal-overlay hidden">
    <div class="modal-box">
        <p>Вы уверены, что хотите полностью очистить холст для всех участников?</p>
        <div class="modal-buttons">
            <button class="room-btn btn-main" onclick="confirmClear(true)">Да, очистить</button>
            <button class="room-btn" style="background: var(--bg-dark); color: white;" onclick="confirmClear(false)">Отмена</button>
        </div>
    </div>
</div>

<div id="alertModal" class="modal-overlay hidden">
    <div class="modal-box">
        <p id="alertModalMessage">Сообщение</p>
        <div class="modal-buttons">
            <button class="room-btn btn-main" onclick="closeAlertModal()">Понятно</button>
        </div>
    </div>
</div>

<script>
    const mainCanvas = document.getElementById('mainCanvas');
    const mainCtx = mainCanvas.getContext('2d', {willReadFrequently: true});
    const tempCanvas = document.getElementById('tempCanvas');
    const tempCtx = tempCanvas.getContext('2d');
    
    let currentRoom = 'main';
    let drawing = false;
    let tool = 'brush';
    let startX, startY;
    let zoom = 1;
    let mode = 'create';
    
    let currentActionId = null;

    const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
    const wsUrl = `${protocol}//${window.location.host}/ws`;
    const socket = new WebSocket(wsUrl);

    function wsEmit(eventName, payload) {
        if (socket.readyState === WebSocket.OPEN) {
            socket.send(JSON.stringify({ event: eventName, data: payload }));
        }
    }

    socket.onopen = () => {
        const savedRoom = sessionStorage.getItem('currentRoom');
        const savedPass = sessionStorage.getItem('roomPass');
        
        if (savedRoom && savedPass && savedRoom !== 'main') {
            wsEmit('join_private', { room: savedRoom, password: savedPass });
        } else {
            wsEmit('join_main', {});
        }
    };

    socket.onmessage = async (event) => {
        const msg = JSON.parse(event.data);
        const ev = msg.event;
        const d = msg.data;

        if (ev === 'draw_line') {
            if(d.room === currentRoom) drawLocalLine(mainCtx, d.x0, d.y0, d.x1, d.y1, d.color, d.size);
        } else if (ev === 'draw_shape') {
            if(d.room === currentRoom) drawLocalShape(mainCtx, d);
        } else if (ev === 'draw_image') {
            if(d.room === currentRoom) drawImageOnCanvas(d.image_data, d.x || 0, d.y || 0);
        } else if (ev === 'canvas_state') {
            mainCtx.clearRect(0,0,1200,800);
            for (const item of d) {
            if (item.type === 'image') {
                await drawImageOnCanvas(item.image_data, item.x || 0, item.y || 0);
            } else if (item.type) {
                drawLocalShape(mainCtx, item);
            } else {
                drawLocalLine(mainCtx, item.x0, item.y0, item.x1, item.y1, item.color, item.size);
            }
            }
        } else if (ev === 'clear_canvas') {
            mainCtx.clearRect(0,0,1200,800);
        } else if (ev === 'chat_state') {
            const m = document.getElementById('messages');
            m.innerHTML = '';
            if (d) {
                d.forEach(item => {
                    const color = item.user === 'Система' ? '#f1c40f' : '#1abc9c';
                    m.innerHTML += `<div><b style="color:${color}">${item.user}:</b> ${item.text}</div>`;
                });
            }
            m.scrollTop = m.scrollHeight;
        } else if (ev === 'room_joined') {
            hideError();
            sessionStorage.setItem('currentRoom', d.room);
            if (window.lastAttemptedPass) {
                sessionStorage.setItem('roomPass', window.lastAttemptedPass);
            }

            wsEmit('leave_room_event', {room: currentRoom, to_main: false, new_room: d.room});
            currentRoom = d.room;
            document.getElementById('roomSelector').classList.add('hidden');
            document.getElementById('roomForm').classList.add('hidden');
            document.getElementById('activeRoomInfo').classList.remove('hidden');
            document.getElementById('statusValue').innerText = 'Комната ' + d.room;
            mainCtx.clearRect(0, 0, 1200, 800);
            document.getElementById('messages').innerHTML = '';
            document.getElementById('roomInput').value = '';
            document.getElementById('passInput').value = '';
        } else if (ev === 'chat_message') {
            const m = document.getElementById('messages');
            const color = d.user === 'Система' ? '#f1c40f' : '#1abc9c';
            m.innerHTML += `<div><b style="color:${color}">${d.user}:</b> ${d.text}</div>`;
            m.scrollTop = m.scrollHeight;
        } else if (ev === 'error') {
            const errDiv = document.getElementById('roomError');
            errDiv.innerText = d.msg;
            errDiv.classList.remove('hidden');
            sessionStorage.removeItem('currentRoom');
            sessionStorage.removeItem('roomPass');
        }
    };

    function handleEnter(e, callback) { if (e.key === 'Enter') callback(); }
    function handleRoomEnter(e) { if (e.key === 'Enter') document.getElementById('passInput').focus(); }

    function setTool(t, btn) {
        tool = t;
        document.querySelectorAll('.t-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    function changeZoom(val) {
        zoom = Math.max(0.2, Math.min(3, zoom + val));
        document.getElementById('zoomWrapper').style.transform = `scale(${zoom})`;
        document.getElementById('zoomVal').innerText = Math.round(zoom * 100) + '%';
    }

    function drawImageOnCanvas(dataUrl, x = 0, y = 0) {
        return new Promise((resolve) => {
            const img = new Image();
            img.onload = () => {
                mainCtx.drawImage(img, x, y);
                resolve(); 
            };
            img.onerror = () => {
                console.error("Ошибка загрузки изображения");
                resolve(); 
            };
            img.src = dataUrl;
        });
    }

    document.getElementById('imgLoader').onchange = function(e) {
        const file = e.target.files[0];
        if (!file) return;

        // Ограничение: 1 МБ (1024 * 1024 байт)
        const MAX_SIZE = 1 * 1024 * 1024; 
        if (file.size > MAX_SIZE) {
            showAlertModal("Файл слишком большой! Пожалуйста, выберите изображение размером до 1 МБ.");
            this.value = ''; // Сбрасываем выбор
            return;
        }

        const reader = new FileReader();
        reader.onload = async (ev) => {
            const imageData = ev.target.result;
            const actionId = Date.now().toString() + Math.random().toString();
            
            await drawImageOnCanvas(imageData, 0, 0);
            
            wsEmit('draw_image', { 
                image_data: imageData, 
                x: 0, y: 0, 
                room: currentRoom, 
                action_id: actionId 
            });
        };
        reader.readAsDataURL(file);
    };

    function saveImage() {
        const link = document.createElement('a');
        link.download = 'splotch_art.png';
        const finalCanvas = document.createElement('canvas');
        finalCanvas.width = mainCanvas.width; finalCanvas.height = mainCanvas.height;
        const fCtx = finalCanvas.getContext('2d');
        fCtx.fillStyle = '#ffffff'; fCtx.fillRect(0,0, finalCanvas.width, finalCanvas.height);
        fCtx.drawImage(mainCanvas, 0, 0);
        link.href = finalCanvas.toDataURL();
        link.click();
    }

    function undoLastAction() { wsEmit('undo_action', { room: currentRoom }); }
    
    function redoLastAction() { wsEmit('redo_action', { room: currentRoom }); }

    function showClearModal() { document.getElementById('clearModal').classList.remove('hidden'); }
    function confirmClear(isYes) {
        document.getElementById('clearModal').classList.add('hidden');
        if (isYes) wsEmit('clear_canvas', { room: currentRoom });
    }
    
    // Функции для показа и скрытия окна уведомлений
    function showAlertModal(msg) {
        document.getElementById('alertModalMessage').innerText = msg;
        document.getElementById('alertModal').classList.remove('hidden');
    }

    function closeAlertModal() {
        document.getElementById('alertModal').classList.add('hidden');
    }

    tempCanvas.onmousedown = (e) => {
        drawing = true;
        startX = e.offsetX;
        startY = e.offsetY;
        currentActionId = Date.now().toString() + Math.random().toString(); 
        
        if (tool === 'fill') {
            const colorHex = document.getElementById('colorPicker').value;
            const rgb = hexToRgb(colorHex);
            if (rgb) {
                floodFill(mainCtx, startX, startY, rgb);
                wsEmit('draw_shape', {type: 'flood_fill', x: startX, y: startY, color: colorHex, room: currentRoom, action_id: currentActionId});
            }
            drawing = false;
        }
    };

    tempCanvas.onmousemove = (e) => {
        if (!drawing) return;
        const x = e.offsetX;
        const y = e.offsetY;
        const color = (tool === 'eraser') ? '#ffffff' : document.getElementById('colorPicker').value;
        const size = document.getElementById('sizeSlider').value;
        
        if (tool === 'brush' || tool === 'eraser') {
            drawLocalLine(mainCtx, startX, startY, x, y, color, size);
            wsEmit('draw_line', { x0: startX, y0: startY, x1: x, y1: y, room: currentRoom, color: color, size: size, action_id: currentActionId });
            startX = x; startY = y;
        } else {
            tempCtx.clearRect(0, 0, tempCanvas.width, tempCanvas.height);
            drawLocalShape(tempCtx, { type: tool, x0: startX, y0: startY, x1: x, y1: y, color: color, size: size });
        }
    };

    tempCanvas.onmouseup = (e) => {
        if (!drawing) return;
        drawing = false;
        if (tool !== 'brush' && tool !== 'eraser' && tool !== 'fill') {
            const color = document.getElementById('colorPicker').value;
            const size = document.getElementById('sizeSlider').value;
            const data = { type: tool, x0: startX, y0: startY, x1: e.offsetX, y1: e.offsetY, color: color, size: size, room: currentRoom, action_id: currentActionId };
            tempCtx.clearRect(0, 0, tempCanvas.width, tempCanvas.height);
            drawLocalShape(mainCtx, data);
            wsEmit('draw_shape', data);
        }
    };

    function drawLocalLine(ctx, x0, y0, x1, y1, color, size) {
        ctx.strokeStyle = color;
        ctx.lineWidth = size;
        ctx.lineCap = 'round';
        ctx.beginPath(); ctx.moveTo(x0, y0); ctx.lineTo(x1, y1); ctx.stroke();
    }

    function drawLocalShape(ctx, d) {
        if (d.type === 'flood_fill') { const rgb = hexToRgb(d.color); if(rgb) floodFill(ctx, d.x, d.y, rgb); return; }
        if (d.type === 'fill_rect') { ctx.fillStyle = d.color; ctx.fillRect(d.x0, d.y0, d.x1 - d.x0, d.y1 - d.y0); return; }
        
        ctx.strokeStyle = d.color;
        ctx.lineWidth = d.size;
        ctx.beginPath();
        if (d.type === 'line') { ctx.moveTo(d.x0, d.y0); ctx.lineTo(d.x1, d.y1); }
        else if (d.type === 'rect') { ctx.strokeRect(d.x0, d.y0, d.x1 - d.x0, d.y1 - d.y0); }
        else if (d.type === 'ellipse') {
            ctx.ellipse(d.x0 + (d.x1-d.x0)/2, d.y0 + (d.y1-d.y0)/2, Math.abs(d.x1-d.x0)/2, Math.abs(d.y1-d.y0)/2, 0, 0, Math.PI*2);
        }
        else if (d.type === 'tri') {
            ctx.moveTo(d.x0 + (d.x1-d.x0)/2, d.y0); ctx.lineTo(d.x0, d.y1); ctx.lineTo(d.x1, d.y1); ctx.closePath();
        }
        ctx.stroke();
    }

    function hexToRgb(hex) {
        var result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
        return result ? { r: parseInt(result[1], 16), g: parseInt(result[2], 16), b: parseInt(result[3], 16), a: 255 } : null;
    }

    function floodFill(ctx, startX, startY, fillColorRGB) {
        const canvasWidth = ctx.canvas.width;
        const canvasHeight = ctx.canvas.height;
        const imgData = ctx.getImageData(0, 0, canvasWidth, canvasHeight);
        const data = imgData.data;

        const startPos = (startY * canvasWidth + startX) * 4;
        const startR = data[startPos];
        const startG = data[startPos + 1];
        const startB = data[startPos + 2];
        const startA = data[startPos + 3];

        if (startR === fillColorRGB.r && startG === fillColorRGB.g && startB === fillColorRGB.b && startA === fillColorRGB.a) return;

        const tolerance = 60; 
        const matchStartColor = (pos) => {
            return Math.abs(data[pos] - startR) <= tolerance &&
                   Math.abs(data[pos + 1] - startG) <= tolerance &&
                   Math.abs(data[pos + 2] - startB) <= tolerance &&
                   Math.abs(data[pos + 3] - startA) <= tolerance;
        };
        
        const colorPixel = (pos) => { data[pos] = fillColorRGB.r; data[pos + 1] = fillColorRGB.g; data[pos + 2] = fillColorRGB.b; data[pos + 3] = 255; };

        const pixelStack = [[startX, startY]];
        while (pixelStack.length) {
            const newPos = pixelStack.pop();
            const x = newPos[0];
            let y = newPos[1];

            let pixelPos = (y * canvasWidth + x) * 4;
            while (y-- >= 0 && matchStartColor(pixelPos)) pixelPos -= canvasWidth * 4;
            pixelPos += canvasWidth * 4;
            ++y;
            let reachLeft = false;
            let reachRight = false;
            while (y++ < canvasHeight - 1 && matchStartColor(pixelPos)) {
                colorPixel(pixelPos);
                if (x > 0) {
                    if (matchStartColor(pixelPos - 4)) {
                        if (!reachLeft) { pixelStack.push([x - 1, y]); reachLeft = true; }
                    } else if (reachLeft) { reachLeft = false; }
                }
                if (x < canvasWidth - 1) {
                    if (matchStartColor(pixelPos + 4)) {
                        if (!reachRight) { pixelStack.push([x + 1, y]); reachRight = true; }
                    } else if (reachRight) { reachRight = false; }
                }
                pixelPos += canvasWidth * 4;
            }
        }
        ctx.putImageData(imgData, 0, 0);
    }

    function hideError() { document.getElementById('roomError').classList.add('hidden'); }

    function toggleForm(m) { 
        hideError();
        const form = document.getElementById('roomForm');
        const btnCreate = document.getElementById('btnCreate');
        const btnJoin = document.getElementById('btnJoin');
        if (form.classList.contains('hidden')) { form.classList.remove('hidden'); } 
        else if (mode === m) {
            form.classList.add('hidden');
            btnCreate.classList.remove('btn-active');
            btnJoin.classList.remove('btn-active');
            mode = ''; return;
        }
        if (m === 'create') { btnCreate.classList.add('btn-active'); btnJoin.classList.remove('btn-active'); } 
        else { btnJoin.classList.add('btn-active'); btnCreate.classList.remove('btn-active'); }
        mode = m;
    }

    function submitRoom() {
        hideError();
        const r = document.getElementById('roomInput').value;
        const p = document.getElementById('passInput').value;
        if (r && p) {
            window.lastAttemptedPass = p;
            wsEmit(mode === 'create' ? 'create_room' : 'join_private', {room: r, password: p});
        }
    }

    function leaveToMain() {
        sessionStorage.removeItem('currentRoom');
        sessionStorage.removeItem('roomPass');

        wsEmit('leave_room_event', {room: currentRoom, to_main: true});
        currentRoom = 'main'; 
        wsEmit('join_main', {});
        document.getElementById('roomSelector').classList.remove('hidden');
        document.getElementById('activeRoomInfo').classList.add('hidden');
        document.getElementById('statusValue').innerText = 'В общем зале';
        document.getElementById('btnCreate').classList.remove('btn-active');
        document.getElementById('btnJoin').classList.remove('btn-active');
        document.getElementById('roomForm').classList.add('hidden');
    }

    function sendMsg() {
        const inp = document.getElementById('msgInput');
        if (inp.value) { wsEmit('chat_message', {text: inp.value, room: currentRoom}); inp.value = ''; }
    }

    //Это событие срабатывает в браузере за мгновение до того, как страница начнет выгружаться (при закрытии вкладки, обновлении страницы или переходе по внешней ссылке).
    window.addEventListener('beforeunload', () => {
    // Проверяем, открыто ли еще соединение
    if (socket.readyState === WebSocket.OPEN) {
        // Код 1000 — это стандартный код WebSocket, означающий "Нормальное закрытие"
        socket.close(1000, "Пользователь закрыл вкладку");
    }
});
</script>
</body>
</html>
